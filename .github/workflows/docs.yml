name: Docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "src/**"
      - "mkdocs.yml"
      - "mkdocs_hooks.py"
      - "overrides/**"
      - "pyproject.toml"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

# The docs site is hosted on AWS S3 (private) + CloudFront, served at
# https://eupago.bilouro.com. Deploy is tokenless via GitHub OIDC: the job
# assumes an IAM role (AWS_DEPLOY_ROLE_ARN) scoped to this repo, syncs the
# built site to the bucket, and invalidates the CloudFront cache.
permissions:
  contents: read
  id-token: write

concurrency:
  group: docs-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Cairo (for mkdocs-material social plugin)
        run: sudo apt-get update && sudo apt-get install -y libcairo2-dev libfreetype6-dev
      - run: pip install -e ".[docs]"
      - run: mkdocs build --strict

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: eu-west-1

      - name: Sync to S3
        run: aws s3 sync site/ "s3://${{ secrets.DOCS_S3_BUCKET }}/" --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ secrets.DOCS_CF_DISTRIBUTION_ID }}" \
            --paths "/*"
