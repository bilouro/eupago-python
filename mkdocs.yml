site_name: eupago Python SDK
site_url: https://bilouro.github.io/eupago-python/
site_description: Unofficial Python SDK for the eupago payment gateway
repo_url: https://github.com/bilouro/eupago-python
repo_name: bilouro/eupago-python
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

hooks:
  - mkdocs_hooks.py

plugins:
  - search:
      lang:
        - pt
        - en
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: pt
          name: Português
          build: true
          site_name: eupago Python SDK
          site_description: SDK Python não-oficial para o gateway de pagamentos eupago
          nav_translations:
            Home: Início
            Getting Started: Começar
            Installation & Quickstart: Instalação e Quickstart
            Configuration: Configuração
            Payments: Pagamentos
            Which method to choose?: Qual método escolher?
            Credit Card: Cartão de Crédito
            Signature Verification: Verificação de assinatura
            Recipes: Receitas
            Errors & Troubleshooting: Erros e Troubleshooting
            API Reference: Referência API
            Contributing: Contribuir
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3
            members_order: source
            docstring_style: google

nav:
  - Home: index.md
  - Getting Started:
    - Installation & Quickstart: getting-started/index.md
    - Configuration: getting-started/configuration.md
  - Payments:
    - Which method to choose?: payments/index.md
    - MB WAY: payments/mbway.md
    - Multibanco: payments/multibanco.md
    - Credit Card: payments/credit-card.md
    - Apple Pay: payments/apple-pay.md
    - Google Pay: payments/google-pay.md
  - Webhooks:
    - Webhooks: webhooks/index.md
    - Signature Verification: webhooks/signature.md
  - Recipes:
    - Recipes: recipes/index.md
    - FastAPI: recipes/fastapi.md
    - Django: recipes/django.md
    - Flask: recipes/flask.md
  - Errors & Troubleshooting: errors/index.md
  - API Reference: api/index.md
  - Contributing: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bilouro/eupago-python
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/eupago/
