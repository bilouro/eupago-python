site_name: eupago Python SDK
site_url: https://bilouro.github.io/eupago-python/
site_description: SDK Python não-oficial para o gateway de pagamentos eupago
repo_url: https://github.com/bilouro/eupago-python
repo_name: bilouro/eupago-python
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Mudar para modo escuro
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Mudar para modo claro
  features:
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search:
      lang:
        - pt
        - en
  - i18n:
      docs_structure: suffix
      reconfigure_material: true
      languages:
        - locale: pt
          default: true
          name: Português
          build: true
        - locale: en
          name: English
          build: true
          site_name: eupago Python SDK
          site_description: Unofficial Python SDK for the eupago payment gateway
          nav_translations:
            Início: Home
            Começar: Getting Started
            Instalação e Quickstart: Installation & Quickstart
            Configuração: Configuration
            Pagamentos: Payments
            Qual método escolher?: Which method to choose?
            Cartão de Crédito: Credit Card
            Webhooks: Webhooks
            Verificação de assinatura: Signature Verification
            Receitas: Recipes
            Erros e Troubleshooting: Errors & Troubleshooting
            Referência API: API Reference
            Contribuir: Contributing
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: false
            show_root_heading: true
            heading_level: 3
            members_order: source
            docstring_style: google

nav:
  - Início: index.md
  - Começar:
    - Instalação e Quickstart: getting-started/index.md
    - Configuração: getting-started/configuration.md
  - Pagamentos:
    - Qual método escolher?: payments/index.md
    - MB WAY: payments/mbway.md
    - Multibanco: payments/multibanco.md
    - Cartão de Crédito: payments/credit-card.md
    - Apple Pay: payments/apple-pay.md
    - Google Pay: payments/google-pay.md
  - Webhooks:
    - Webhooks: webhooks/index.md
    - Verificação de assinatura: webhooks/signature.md
  - Receitas:
    - Receitas: recipes/index.md
    - FastAPI: recipes/fastapi.md
    - Django: recipes/django.md
    - Flask: recipes/flask.md
  - Erros e Troubleshooting: errors/index.md
  - Referência API: api/index.md
  - Contribuir: contributing.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/bilouro/eupago-python
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/eupago/
